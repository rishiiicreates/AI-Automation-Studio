<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    </style>
</head>
<body>
    <div class="w-[1000px] h-[600px] bg-[#111] border border-[#222] rounded-3xl shadow-2xl p-8 flex flex-col gap-6">
        
        <div class="flex justify-between items-center border-b border-[#333] pb-4">
            <h2 class="text-2xl font-semibold">PostgreSQL Cluster</h2>
            <div class="flex items-center gap-2 text-green-400">
                <div class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>
                Healthy
            </div>
        </div>

        <div class="flex gap-6 h-[400px]">
            <div class="flex-1 bg-[#1a1a1a] rounded-xl border border-[#333] p-6 flex flex-col gap-4">
                <span class="text-gray-400 uppercase text-xs font-bold tracking-wider">Queries / Sec</span>
                <span class="text-5xl font-light text-blue-400">12,458</span>
                
                <div class="mt-auto h-32 flex items-end gap-2">
                    <div class="w-full bg-blue-500/20 rounded-t-sm" style="height: 40%"></div>
                    <div class="w-full bg-blue-500/30 rounded-t-sm" style="height: 60%"></div>
                    <div class="w-full bg-blue-500/40 rounded-t-sm" style="height: 85%"></div>
                    <div class="w-full bg-blue-500/50 rounded-t-sm" style="height: 70%"></div>
                    <div class="w-full bg-blue-500/60 rounded-t-sm" style="height: 95%"></div>
                    <div class="w-full bg-blue-400 rounded-t-sm glow" style="height: 100%; box-shadow: 0 0 10px #60a5fa;"></div>
                </div>
            </div>

            <div class="flex-1 flex flex-col gap-6">
                <div class="flex-1 bg-[#1a1a1a] rounded-xl border border-[#333] p-6 flex items-center justify-between">
                    <div class="flex flex-col gap-1">
                        <span class="text-gray-400 uppercase text-xs font-bold tracking-wider">Avg Latency</span>
                        <span class="text-3xl font-light">4.2 ms</span>
                    </div>
                    <svg class="w-12 h-12 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div class="flex-1 bg-[#1a1a1a] rounded-xl border border-[#333] p-6 flex items-center justify-between">
                    <div class="flex flex-col gap-1">
                        <span class="text-gray-400 uppercase text-xs font-bold tracking-wider">Active Connections</span>
                        <span class="text-3xl font-light">1,024</span>
                    </div>
                    <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
