<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .node { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 250px; z-index: 10;}
        .line { position: absolute; height: 2px; background: #58a6ff; z-index: 1; }
        .glow { box-shadow: 0 0 20px rgba(88, 166, 255, 0.4); border-color: #58a6ff; }
    </style>
</head>
<body>
    <div class="relative w-[1000px] h-[600px] flex items-center justify-between p-12 bg-[#0d1117] border border-[#30363d] rounded-2xl shadow-2xl overflow-hidden">
        
        <div class="line" style="width: 250px; top: 300px; left: 200px;"></div>
        <div class="line" style="width: 250px; top: 300px; left: 550px;"></div>
        
        <!-- Document Node -->
        <div class="node">
            <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span class="font-semibold">Knowledge Base</span>
            <span class="text-xs text-gray-500">PDFs, Confluence, Notion</span>
        </div>

        <!-- LLM Node -->
        <div class="node glow bg-[#1f2937]">
            <svg class="w-12 h-12 text-[#58a6ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="font-semibold text-white">Agentic LLM</span>
            <span class="text-xs text-[#58a6ff]">Retrieval Augmented Generation</span>
        </div>

        <!-- Output Node -->
        <div class="node">
            <svg class="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            <span class="font-semibold">Synthesized Answer</span>
            <span class="text-xs text-green-500">Precise & Cited</span>
        </div>
        
    </div>
</body>
</html>
